<link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/toc.css" | relURL }}">
<link id="site-favicon" rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
<script>
  (() => {
    const icons = [
      "{{ "favicon.svg" | relURL }}",
      "{{ "favicon-two-black.svg" | relURL }}",
      "{{ "favicon-three-black.svg" | relURL }}",
    ];
    const icon = icons[Math.floor(Math.random() * icons.length)];
    document.getElementById("site-favicon").href = `${icon}?v=${Date.now()}`;
  })();
</script>
